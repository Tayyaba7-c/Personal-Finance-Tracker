<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Login - Finance Tracker</title>
    <style>
        body { background: #8ad0d0; display: flex; align-items: center; min-height: 100vh; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-success { background: #1cc88a; border: none; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h3 class="text-center fw-bold mb-4 text-success">User Login</h3>
                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label class="small fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Sign In</button>
                    </form>
                    <p class="text-center mt-3 small">Don't have an account? <a href="/register" class="text-decoration-none">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
